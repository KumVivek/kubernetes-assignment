apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-loadgen
  template:
    metadata:
      labels:
        app: api-loadgen
    spec:
      containers:
        - name: loadgen
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting load generation against http://api/records";
              while true; do
                wget -qO- http://api/records >/dev/null 2>&1 || true;
                wget -qO- http://api/records >/dev/null 2>&1 || true;
                wget -qO- http://api/records >/dev/null 2>&1 || true;
              done
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi

