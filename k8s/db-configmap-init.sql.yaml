apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS records (
      id SERIAL PRIMARY KEY,
      name TEXT NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    INSERT INTO records (name) VALUES
      ('alpha'),
      ('bravo'),
      ('charlie'),
      ('delta'),
      ('echo'),
      ('foxtrot'),
      ('golf');

